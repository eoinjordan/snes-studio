name: CI
on:
  push:
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e '.[dev]'
      - run: pytest -q
      - run: snes-studio validate examples/hello-human/project.snesproj --json
      - run: snes-studio export-c examples/hello-human/project.snesproj build/generated/hello-human --json
      - run: snes-studio make:rom examples/hello-human/project.snesproj build/hello-human.sfc --skip-build --json
      - run: scripts/validate-rom.sh build/hello-human.sfc
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package.json
      - run: cd web && npm install
      - run: cd web && npm run build
